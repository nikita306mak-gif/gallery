<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Gram</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WeddingGram">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1077/1077035.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-btn { display: none !important; }
        body.is-admin .admin-btn { display: flex !important; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #0f172a; color: white; }
        .active-tab { color: #facc15 !important; border-top: 2px solid #facc15; }
        .gallery-item { aspect-ratio: 1 / 1; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <header class="bg-slate-900 border-b border-slate-800 px-4 py-4 sticky top-0 z-40 flex items-center justify-between">
        <div class="w-12 text-[10px] font-black text-slate-500 uppercase tracking-tighter" id="filter-status">Лента</div>
        <h1 class="text-xl font-bold tracking-tight text-white cursor-pointer" onclick="tryAdmin()">Никита + Анастасия</h1>
        <div class="w-12 flex justify-end">
            <div id="online-indicator" class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto bg-slate-950">
        <div id="status-bar" class="text-[10px] text-yellow-400 py-2 tracking-[3px] opacity-0 text-center uppercase font-bold transition-opacity bg-slate-900 border-b border-slate-800">Загрузка...</div>
        <div id="gallery" class="grid grid-cols-3 gap-0.5"></div>
        <div id="empty-msg" class="hidden flex flex-col items-center justify-center p-20 text-slate-600 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            <p class="text-xs uppercase tracking-widest">Галерея пуста</p>
        </div>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 px-2 pb-8 pt-2 z-40 flex justify-around items-center">
        <button id="nav-profile" onclick="setFilter(true)" class="flex flex-col items-center gap-1 p-2 text-slate-500 transition-all w-16">
