<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Gram</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-btn { display: none !important; }
        body.is-admin .admin-btn { display: flex !important; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #0f172a; color: white; }
        .active-tab { color: #facc15 !important; border-top: 2px solid #facc15; }
        .gallery-item { aspect-ratio: 1 / 1; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <header class="bg-slate-900 border-b border-slate-800 px-4 py-4 sticky top-0 z-40 flex items-center justify-between">
        <div class="w-12 text-[10px] font-black text-slate-500 uppercase tracking-tighter" id="filter-status">Лента</div>
        <h1 class="text-xl font-bold tracking-tight text-white cursor-pointer" onclick="tryAdmin()">Никита + Анастасия</h1>
        <div class="w-12 flex justify-end"><div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div></div>
    </header>

    <main class="flex-grow overflow-y-auto bg-slate-950">
        <div id="status-bar" class="text-[10px] text-yellow-400 py-2 tracking-[3px] opacity-0 text-center uppercase font-bold transition-opacity bg-slate-900 border-b border-slate-800">Загрузка...</div>
        <div id="gallery" class="grid grid-cols-3 gap-0.5"></div>
        <div id="empty-msg" class="hidden flex flex-col items-center justify-center p-20 text-slate-600 text-center">
            <p class="text-xs uppercase tracking-widest">Галерея пуста</p>
        </div>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 px-2 pb-8 pt-2 z-40 flex justify-around items-center">
        <button id="nav-profile" onclick="setFilter(true)" class="flex flex-col items-center gap-1 p-2 text-slate-500 w-16">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            <span class="text-[9px] font-bold uppercase">Мои</span>
        </button>

        <label class="bg-yellow-500 text-slate-950 p-4 rounded-2xl shadow-xl active:scale-90 transition-transform cursor-pointer -mt-8 border-4 border-slate-950">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4" /></svg>
            <input type="file" id="upload-input" class="hidden" accept="image/*">
        </label>

        <button id="nav-all" onclick="setFilter(false)" class="flex flex-col items-center gap-1 p-2 text-slate-500 active-tab w-16">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            <span class="text-[9px] font-bold uppercase">Лента</span>
        </button>
    </footer>

    <div id="photo-viewer" class="fixed inset-0 bg-black z-[100] hidden flex flex-col" onclick="this.classList.add('hidden')">
        <header class="p-4 flex items-center justify-between bg-black/80">
            <span class="font-bold text-sm text-white" id="viewer-name">Автор</span>
            <button id="admin-delete-btn" class="admin-btn bg-red-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase" onclick="event.stopPropagation()">Удалить</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-2"><img id="full-photo" src="" class="max-w-full max-h-[85vh] object-contain" onclick="event.stopPropagation()"></div>
    </div>

    <div id="name-modal" class="fixed inset-0 bg-slate-950 z-[200] hidden p-8 flex flex-col items-center justify-center text-center">
        <h2 class="text-3xl font-black uppercase italic text-white mb-6">Wedding Gram</h2>
        <input type="text" id="user-name-input" class="w-full max-w-xs p-5 rounded-2xl bg-slate-900 border-2 border-slate-800 text-white outline-none text-center font-bold" placeholder="Ваше имя">
        <button onclick="saveName()" class="w-full max-w-xs bg-yellow-500 text-slate-950 font-black py-5 rounded-2xl mt-4 tracking-widest uppercase text-xs">Войти</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
            authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
            projectId: "wedding-global-gallery-b7876",
            storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
            messagingSenderId: "59194059288",
            appId: "1:59194059288:web:e7db71815514a96b7de16d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let unsub = null;
        let filterMy = false;

        window.saveName = () => {
            const val = document.getElementById('user-name-input').value.trim();
            if (val.length > 1) { localStorage.setItem('wedding_user', val); location.reload(); }
        };

        window.setFilter = (my) => {
            filterMy = my;
            document.getElementById('nav-profile').classList.toggle('active-tab', my);
            document.getElementById('nav-all').classList.toggle('active-tab', !my);
            document.getElementById('filter-status').innerText = my ? "Мои" : "Лента";
            load();
        };

        const load = () => {
            if (unsub) unsub();
            const user = localStorage.getItem('wedding_user');
            let q = query(collection(db, "photos"), orderBy("time", "desc"));
            if (filterMy && user) q = query(collection(db, "photos"), where("author", "==", user), orderBy("time", "desc"));

            unsub = onSnapshot(q, (snap) => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                document.getElementById('empty-msg').classList.toggle('hidden', !snap.empty);
                snap.forEach(d => {
                    const data = d.data();
                    gallery.innerHTML += `<div class="gallery-item relative overflow-hidden bg-slate-900 border-slate-950 border-[0.5px]" onclick="openPhoto('${d.id}', '${data.url}', '${data.author}')">
                        <img src="${data.url}" class="w-full h-full object-cover">
                        <button onclick="event.stopPropagation(); removePhoto('${d.id}')" class="admin-btn absolute top-1 right-1 bg-red-600 text-white w-5 h-5 flex items-center justify-center rounded-full text-[10px]">✕</button>
                    </div>`;
                });
            });
        };

        window.openPhoto = (id, url, auth) => {
            document.getElementById('full-photo').src = url;
            document.getElementById('viewer-name').innerText = auth;
            document.getElementById('photo-viewer').classList.remove('hidden');
            document.getElementById('admin-delete-btn').onclick = () => removePhoto(id);
        };

        window.removePhoto = async (id) => { if (confirm("Удалить?")) await deleteDoc(doc(db, "photos", id)); };
        window.tryAdmin = () => { if (prompt("Пароль:") === "1234") document.body.classList.toggle('is-admin'); };

        document.getElementById('upload-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const bar = document.getElementById('status-bar');
            bar.style.opacity = '1'; bar.innerText = "ЗАГРУЗКА...";
            
            const fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=735b440591505ed937f6d64b1d3dc16c', { method: 'POST', body: fd });
                const d = await res.json();
                if (d.success) {
                    await addDoc(collection(db, "photos"), { url: d.data.url, time: Date.now(), author: localStorage.getItem('wedding_user') });
                }
            } catch (err) { alert("Ошибка"); }
            bar.style.opacity = '0';
        });

        const user = localStorage.getItem('wedding_user');
        if (!user) document.getElementById('name-modal').classList.remove('hidden');
