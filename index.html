<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        calligraphy: ['Great Vibes', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style>
        .admin-btn { display: none !important; }
        body.is-admin .admin-btn { display: flex !important; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .active-tab { color: #1c1917 !important; font-weight: 700; }
        /* Фикс для закрепленной панели на iOS */
        @supports (-webkit-touch-callout: none) { .safe-bottom { padding-bottom: 2rem; } }
    </style>
</head>
<body class="bg-white text-stone-900 h-screen flex flex-col font-sans overscroll-none">

    <header class="bg-white/95 backdrop-blur-sm border-b border-stone-200 px-5 py-4 sticky top-0 z-40 flex items-center justify-between shadow-sm">
        <div class="w-12 text-[10px] font-bold text-stone-400 uppercase tracking-widest" id="filter-status">Лента</div>
        <h1 class="text-3xl font-calligraphy text-stone-800 cursor-pointer" onclick="tryAdmin()">Никита + Анастасия</h1>
        <div class="w-12 flex justify-end">
            <div id="online-indicator" class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto bg-stone-50 pb-32">
        <div id="status-bar" class="text-[10px] text-stone-500 py-2 tracking-[3px] opacity-0 text-center uppercase font-bold transition-opacity bg-white border-b border-stone-100">Загрузка...</div>
        <div id="gallery" class="grid grid-cols-3 gap-0.5 p-0.5">
            </div>
        <div id="empty-msg" class="hidden flex flex-col items-center justify-center p-20 text-stone-400 text-center">
            <p class="text-xs uppercase tracking-widest font-medium">Галерея пока пуста</p>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 px-3 pb-8 pt-3 z-40 flex justify-around items-end shadow-[0_-5px_20px_rgba(0,0,0,0.05)] safe-bottom">
        
        <button id="nav-profile" onclick="setFilter(true)" class="flex flex-col items-center gap-1.5 p-2.5 text-stone-400 transition-all w-20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            <span class="text-[10px] font-semibold uppercase tracking-wider">Мои</span>
        </button>

        <label class="bg-stone-950 text-white p-5 rounded-full shadow-2xl active:scale-90 transition-transform cursor-pointer -mt-10 border-8 border-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
            <input type="file" id="upload-input" class="hidden" accept="image/*" capture="environment">
        </label>

        <button id="nav-all" onclick="setFilter(false)" class="flex flex-col items-center gap-1.5 p-2.5 text-stone-400 active-tab transition-all w-20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            <span class="text-[10px] font-semibold uppercase tracking-wider">Лента</span>
        </button>
    </footer>

    <div id="photo-viewer" class="fixed inset-0 bg-black z-[100] hidden flex flex-col" onclick="closePhoto()">
        <header class="p-5 flex items-center justify-between bg-black/50 backdrop-blur-sm">
             <div class="flex items-center gap-3">
                 <div class="w-9 h-9 rounded-full bg-stone-800 flex items-center justify-center text-xs font-bold text-white border border-stone-700 uppercase" id="viewer-avatar">?</div>
                 <span class="font-semibold text-sm text-white" id="viewer-name">Автор</span>
             </div>
             <button id="admin-delete-btn" class="admin-btn bg-red-600 text-white px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg" onclick="event.stopPropagation()">Удалить</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-3">
            <img id="full-photo" src="" class="max-w-full max-h-[85vh] object-contain shadow-2xl rounded" onclick="event.stopPropagation()">
        </div>
    </div>

    <div id="name-modal" class="fixed inset-0 bg-white z-[200] hidden p-10 flex flex-col items-center justify-center text-center">
        <div class="mb-10">
            <h2 class="text-5xl font-calligraphy text-stone-800 mb-2">Wedding Gram</h2>
            <p class="text-stone-400 text-xs font-medium tracking-[3px] uppercase">Никита и Анастасия</p>
        </div>
        <input type="text" id="user-name-input" class="w-full max-w-xs p-5 rounded-2xl bg-stone-100 border border-stone-200 focus:border-stone-900 transition-all outline-none text-center font-bold text-lg" placeholder="Ваше имя">
        <button onclick="saveName()" class="w-full max-w-xs bg-stone-950 text-white font-bold py-5 rounded-2xl mt-5 active:scale-95 transition-all shadow-xl tracking-widest uppercase text-xs">Войти</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ТВОЙ КОНФИГ
        const firebaseConfig = {
            apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
            authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
            projectId: "wedding-global-gallery-b7876",
            storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
            messagingSenderId: "59194059288",
            appId: "1:59194059288:web:e7db71815514a96b7de16d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let unsub = null;
        let filterMy = false;

        // Имя автора
        window.saveName = () => {
            const val = document.getElementById('user-name-input').value.trim();
            if (val.length > 1) { localStorage.setItem('wedding_user', val); location.reload(); }
        };

        // Переключение фильтра
        window.setFilter = (my) => {
            filterMy = my;
            document.getElementById('nav-profile').classList.toggle('active-tab', my);
            document.getElementById('nav-all').classList.toggle('active-tab', !my);
            document.getElementById('filter-status').innerText = my ? "Мои" : "Лента";
            load();
        };

        // Загрузка галереи
        const load = () => {
            if (unsub) unsub();
            const gallery = document.getElementById('gallery');
            const user = localStorage.getItem('wedding_user');
            
            statusBar.innerText = "ОБНОВЛЕНИЕ...";
            statusBar.style.opacity = '1';

            let q = query(collection(db, "photos"), orderBy("time", "desc"));
            if (filterMy && user) q = query(collection(db, "photos"), where("author", "==", user), orderBy("time", "desc"));

            unsub = onSnapshot(q, (snap) => {
                gallery.innerHTML = '';
                document.getElementById('empty-msg').classList.toggle('hidden', !snap.empty);
                snap.forEach(d => {
                    const data = d.data();
                    const author = data.author || "Гость";
                    gallery.innerHTML += `
                        <div class="relative group bg-white p-1 pb-2 shadow-sm rounded-sm" onclick="openPhoto('${d.id}', '${data.url}', '${author}')">
                            <div class="aspect-square overflow-hidden bg-stone-100 rounded-sm mb-1.5">
                                <img src="${data.url}" class="w-full h-full object-cover loading="lazy">
                            </div>
                            <p class="text-center text-sm font-calligraphy text-stone-600 truncate px-1">${author}</p>
                            <button onclick="event.stopPropagation(); removePhoto('${d.id}')" class="admin-btn absolute top-2 right-2 bg-red-600/90 text-white w-5 h-5 flex items-center justify-center rounded-full text-[10px] font-bold shadow-md">✕</button>
                        </div>`;
                });
                statusBar.style.opacity = '0';
            });
        };

        // Просмотр и удаление
        window.openPhoto = (id, url, auth) => {
            document.getElementById('full-photo').src = url;
            document.getElementById('viewer-name').innerText = auth;
            document.getElementById('viewer-avatar').innerText = auth ? auth[0].toUpperCase() : '?';
            document.getElementById('photo-viewer').classList.remove('hidden');
            document.getElementById('admin-delete-btn').onclick = () => removePhoto(id);
            document.body.style.overflow = 'hidden'; // Запрет скролла фона
        };

        window.closePhoto = () => {
            document.getElementById('photo-viewer').classList.add('hidden');
            document.body.style.overflow = '';
        };

        window.removePhoto = async (id) => { if (confirm("Удалить фото?")) await deleteDoc(doc(db, "photos", id)); };
        window.tryAdmin = () => { if (prompt("Пароль:") === "1234") document.body.classList.toggle('is-admin'); };

        // Логика загрузки (ТВОЙ КЛЮЧ ImgBB)
        const statusBar = document.getElementById('status-bar');
        const uploadFn = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            statusBar.style.opacity = '1'; bar.innerText = "ЗАГРУЗКА...";
            
            const fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=735b440591505ed937f6d64b1d3dc16c', { method: 'POST', body: fd });
                const d = await res.json();
                if (d.success) {
                    statusBar.innerText = "СОХРАНЕНИЕ...";
                    await addDoc(collection(db, "photos"), { 
                        url: d.data.url, 
                        time: Date.now(), 
                        author: localStorage.getItem('wedding_user') || "Гость"
                    });
                }
            } catch (err) { alert("Ошибка загрузки"); }
            statusBar.style.opacity = '0';
            e.target.value = ''; // Сброс инпута
        };

        // И
