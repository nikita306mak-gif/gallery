<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Твой конфиг из Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
        authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
        projectId: "wedding-global-gallery-b7876",
        storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
        messagingSenderId: "591994059288",
        appId: "1:591994059288:web:e7db71815514a96b7de16d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let unsub = null;
    let filterMy = false;
    const statusBar = document.getElementById('status-bar');

    window.saveName = () => {
        const val = document.getElementById('user-name-input').value.trim();
        if (val.length > 1) { localStorage.setItem('wedding_user', val); location.reload(); }
    };

    window.setFilter = (my) => {
        filterMy = my;
        document.getElementById('nav-profile').classList.toggle('active-tab', my);
        document.getElementById('nav-all').classList.toggle('active-tab', !my);
        document.getElementById('filter-status').innerText = my ? "Мои" : "Лента";
        load();
    };

    const load = () => {
        if (unsub) unsub();
        const gallery = document.getElementById('gallery');
        const currentUser = localStorage.getItem('wedding_user');
        
        let q = query(collection(db, "photos"), orderBy("time", "desc"));
        if (filterMy && currentUser) q = query(collection(db, "photos"), where("author", "==", currentUser), orderBy("time", "desc"));

        unsub = onSnapshot(q, (snap) => {
            gallery.innerHTML = '';
            document.getElementById('empty-msg').classList.toggle('hidden', !snap.empty);
            
            snap.forEach(d => {
                const data = d.data();
                const author = data.author || "Гость";
                
                // Исправленная логика выделения твоих фото
                const isMyPhoto = (author === currentUser);
                const borderStyle = (filterMy && isMyPhoto) ? 'border-[6px] border-stone-900 shadow-xl scale-[0.98]' : 'border-transparent';

                gallery.innerHTML += `
                    <div class="relative bg-white p-1 transition-all duration-300 ${borderStyle}" onclick="openPhoto('${d.id}', '${data.url}', '${author}')">
                        <div class="aspect-square overflow-hidden bg-stone-100">
                            <img src="${data.url}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[11px] text-center font-calligraphy py-1.5 text-stone-500 truncate">${author}</p>
                        <button onclick="event.stopPropagation(); removePhoto('${d.id}')" class="admin-btn absolute top-2 right-2 bg-red-600 text-white w-5 h-5 flex items-center justify-center rounded-full text-[10px]">✕</button>
                    </div>`;
            });
        });
    };

    window.openPhoto = (id, url, auth) => {
        document.getElementById('full-photo').src = url;
        document.getElementById('viewer-name').innerText = auth;
        document.getElementById('photo-viewer').classList.remove('hidden');
        document.getElementById('admin-delete-btn').onclick = () => removePhoto(id);
    };

    window.closePhoto = () => document.getElementById('photo-viewer').classList.add('hidden');
    window.removePhoto = async (id) => { if (confirm("Удалить фото?")) await deleteDoc(doc(db, "photos", id)); };
    window.tryAdmin = () => { if (prompt("Пароль:") === "1234") document.body.classList.toggle('is-admin'); };

    document.getElementById('upload-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        statusBar.style.opacity = '1'; statusBar.innerText = "ЗАГРУЗКА...";
        const fd = new FormData(); fd.append('image', file);
        try {
            const res = await fetch('https://api.imgbb.com/1/upload?key=735b440591505ed937f6d64b1d3dc16c', { method: 'POST', body: fd });
            const d = await res.json();
            if (d.success) {
                await addDoc(collection(db, "photos"), { 
                    url: d.data.url, 
                    time: Date.now(), 
                    author: localStorage.getItem('wedding_user') || "Гость"
                });
            }
        } catch (err) { alert("Ошибка загрузки"); }
        statusBar.style.opacity = '0';
        e.target.value = '';
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
    }

    const user = localStorage.getItem('wedding_user');
    if (!user) document.getElementById('name-modal').classList.remove('hidden'); else load();
</script>
