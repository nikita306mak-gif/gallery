<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Playfair Display', serif; }
        .loader { border-top-color: #fbbf24; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .wedding-card { animation: fadeIn 0.8s ease-out forwards; border: 1px solid rgba(251, 191, 36, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-24">
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-amber-500/20 sticky top-0 z-50 p-6 shadow-2xl">
        <div class="max-w-2xl mx-auto flex flex-col items-center gap-4">
            <h1 class="text-3xl font-serif text-amber-400 tracking-widest uppercase italic text-center">Wedding Moments</h1>
            <div class="flex gap-3 w-full justify-center">
                <label class="bg-amber-500 hover:bg-amber-600 active:scale-95 text-slate-950 px-6 py-3 rounded-full text-xs font-bold cursor-pointer transition-all shadow-lg uppercase tracking-tighter">
                    Добавить фото
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                </label>
                <button onclick="downloadAll()" id="downloadBtn" class="hidden bg-slate-800 border border-amber-500/50 hover:bg-slate-700 text-amber-400 px-6 py-3 rounded-full text-xs font-bold transition-all shadow-lg uppercase tracking-tighter">
                    Скачать всё
                </button>
            </div>
        </div>
    </header>

    <div id="status" class="hidden fixed top-32 left-1/2 -translate-x-1/2 bg-slate-800 border border-amber-500/50 shadow-2xl rounded-2xl px-6 py-4 z-[100]">
        <div class="flex items-center gap-4">
            <div class="loader w-6 h-6 border-2 border-amber-100 rounded-full"></div>
            <span class="text-sm font-medium text-amber-100 italic tracking-wider">Сохраняем историю...</span>
        </div>
    </div>

    <main class="max-w-2xl mx-auto p-4 mt-4">
        <div id="gallery" class="grid grid-cols-2 gap-4"></div>
    </main>

    <a id="downloadLink" class="hidden"></a>

    <script>
        const API_KEY = '5075a2f2bf9edb2a94bc4dd69e8e025e'; 
        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        let photos = JSON.parse(localStorage.getItem('wedding_photos') || '[]');

        function renderGallery() {
            if (photos.length === 0) {
                gallery.innerHTML = '<div class="col-span-full text-center py-24 text-slate-500 italic text-sm">Здесь будут ваши воспоминания...</div>';
                downloadBtn.classList.add('hidden');
                return;
            }
            downloadBtn.classList.remove('hidden');
            gallery.innerHTML = photos.map((url, index) => `
                <div class="wedding-card relative aspect-[3/4] rounded-lg overflow-hidden bg-slate-800 shadow-lg">
                    <img src="${url}" class="w-full h-full object-cover" onclick="window.open('${url}', '_blank')">
                    <button onclick="deletePhoto(${index})" class="absolute top-2 right-2 bg-black/60 text-white/70 w-8 h-8 rounded-full flex items-center justify-center backdrop-blur-sm text-[10px]">✕</button>
                </div>`).join('');
        }

        // Функция выгрузки (скачивания)
        window.downloadAll = function() {
            if (photos.length === 0) return;
            
            if (confirm(`Выгрузить все фото (${photos.length} шт.)? Они откроются в новых вкладках или списком.`)) {
                // Создаем текстовый файл со всеми ссылками (самый надежный способ для телефона)
                const linksText = photos.join('\n');
                const blob = new Blob([linksText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.getElementById('downloadLink');
                a.href = url;
                a.download = 'wedding_photo_links.txt';
                a.click();
                
                alert('Файл со ссылками на все фото скачан! Вы сможете открыть их и сохранить разом.');
            }
        }

        window.deletePhoto = function(index) {
            if (confirm('Удалить это воспоминание?')) {
                photos.splice(index, 1);
                localStorage.setItem('wedding_photos', JSON.stringify(photos));
                renderGallery();
            }
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.classList.remove('hidden');
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) {
                    photos.unshift(result.data.url);
                    localStorage.setItem('wedding_photos', JSON.stringify(photos));
                    renderGallery();
                }
            } catch (err) { alert('Ошибка загрузки'); } finally { status.classList.add('hidden'); fileInput.value = ''; }
        });

        renderGallery();
    </script>
</body>
</html>
