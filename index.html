<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], calligraphy: ['Great Vibes', 'cursive'] } } }
        }
    </script>
    <style>
        .admin-btn { display: none !important; }
        body.is-admin .admin-btn { display: flex !important; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #fcfcfc; }
        .gallery-container { padding-bottom: 120px; }
        img { pointer-events: none; -webkit-user-drag: none; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <header class="bg-white/90 backdrop-blur-md border-b border-stone-200 px-5 py-6 sticky top-0 z-40 flex items-center justify-center shadow-sm">
        <h1 class="text-3xl font-calligraphy text-stone-800 cursor-pointer" onclick="tryAdmin()">Никита + Анастасия</h1>
    </header>

    <main class="flex-grow overflow-y-auto gallery-container">
        <div id="status-bar" class="text-[10px] text-stone-500 py-2 tracking-[3px] opacity-0 text-center uppercase font-bold transition-opacity">Загрузка...</div>
        <div id="gallery" class="grid grid-cols-3 gap-0.5 p-0.5"></div>
        <div id="empty-msg" class="hidden flex flex-col items-center justify-center p-20 text-stone-400 text-center italic">Здесь пока пусто...</div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg px-2 pb-10 pt-4 z-40 flex justify-center items-center">
        <label class="bg-stone-900 text-white p-6 rounded-full shadow-2xl active:scale-95 transition-transform cursor-pointer border-[6px] border-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4" /></svg>
            <input type="file" id="upload-input" class="hidden" accept="image/*">
        </label>
    </footer>

    <div id="photo-viewer" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col" onclick="closePhoto()">
        <header class="p-5 flex items-center justify-between text-white">
             <span class="font-bold text-sm" id="viewer-name">Автор</span>
             <button id="admin-delete-btn" class="admin-btn bg-red-600 px-4 py-2 rounded-full text-[10px] font-black uppercase">Удалить</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-4">
            <img id="full-photo" src="" class="max-w-full max-h-[80vh] rounded shadow-2xl">
        </div>
    </div>

    <div id="name-modal" class="fixed inset-0 bg-white z-[200] hidden p-10 flex flex-col items-center justify-center text-center">
        <h2 class="text-5xl font-calligraphy text-stone-800 mb-8">Wedding Gram</h2>
        <input type="text" id="user-name-input" class="w-full max-w-xs p-5 rounded-2xl bg-stone-100 border-none outline-none text-center font-bold text-lg" placeholder="Ваше имя">
        <button onclick="saveName()" class="w-full max-w-xs bg-stone-900 text-white font-bold py-5 rounded-2xl mt-5 shadow-lg uppercase text-xs tracking-widest">Войти</button>
    </div>
