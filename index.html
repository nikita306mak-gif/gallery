<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Live Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-btn { display: none; }
        body.is-admin .admin-btn { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-white p-5 pb-20">

    <div class="max-w-md mx-auto text-center">
        <h1 class="text-3xl font-bold mb-2 text-amber-400 uppercase tracking-widest" onclick="checkAdmin()">Наша Свадьба</h1>
        <p id="welcome-user" class="text-slate-400 mb-8 text-sm italic">Добро пожаловать!</p>

        <label class="bg-amber-500 hover:bg-amber-600 text-slate-950 px-8 py-4 rounded-full font-bold cursor-pointer inline-block mb-4 transition-all shadow-lg active:scale-95">
            ОТПРАВИТЬ ФОТО
            <input type="file" id="upload" class="hidden" accept="image/*">
        </label>

        <div id="status" class="text-[10px] text-slate-500 mb-8 uppercase tracking-tighter">Связь установлена</div>

        <div id="gallery" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="name-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden p-6">
        <div class="bg-slate-800 p-8 rounded-2xl w-full max-w-xs text-center border border-amber-500/30 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-amber-400">Как вас зовут?</h2>
            <p class="text-slate-400 text-sm mb-6">Ваше имя будет отображаться под вашими фотографиями</p>
            <input type="text" id="user-name-input" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white mb-4 outline-none focus:border-amber-500" placeholder="Ваше имя...">
            <button onclick="saveName()" class="w-full bg-amber-500 text-slate-950 font-bold py-3 rounded-lg hover:bg-amber-400 transition-colors">Войти</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ТВОЙ КОНФИГ (ВСТАВЬ ЕГО СЮДА)
        const firebaseConfig = {
            apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
            authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
            projectId: "wedding-global-gallery-b7876",
            storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
            messagingSenderId: "59194059288",
            appId: "1:59194059288:web:94c48c36daa034157de16d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.db = db;
        window.deleteDoc = deleteDoc;
        window.docRef = doc;

        // 1. ПРОВЕРКА ИМЕНИ
        window.userName = localStorage.getItem('wedding_user_name');
        if (!window.userName) {
            document.getElementById('name-modal').classList.remove('hidden');
        } else {
            document.getElementById('welcome-user').innerText = `Рады видеть вас, ${window.userName}!`;
        }

        window.saveName = () => {
            const val = document.getElementById('user-name-input').value;
            if (val.length > 1) {
                localStorage.setItem('wedding_user_name', val);
                window.userName = val;
                document.getElementById('name-modal').classList.add('hidden');
                document.getElementById('welcome-user').innerText = `Рады видеть вас, ${window.userName}!`;
            }
        };

        // 2. АДМИН-ФУНКЦИЯ (Пароль)
        window.checkAdmin = () => {
            const pass = prompt("Введите код администратора:");
            if (pass === "1234") { // МОЖЕШЬ ИЗМЕНИТЬ ПАРОЛЬ ТУТ
                document.body.classList.add('is-admin');
                alert("Режим администратора включен!");
            }
        };

        window.removePhoto = async (id) => {
            if (confirm("Удалить это фото навсегда?")) {
                await deleteDoc(doc(window.db, "photos", id));
            }
        };

        // 3. СЛУШАТЕЛЬ БАЗЫ
        const q = query(collection(db, "photos"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                gallery.innerHTML += `
                    <div class="relative group bg-slate-800 rounded-xl overflow-hidden shadow-xl border border-slate-700">
                        <img src="${data.url}" class="w-full aspect-square object-cover">
                        <div class="p-2 text-[10px] flex justify-between items-center bg-slate-800/80 backdrop-blur-sm">
                            <span class="text-amber-400 font-medium truncate">${data.author || 'Гость'}</span>
                            <button onclick="removePhoto('${doc.id}')" class="admin-btn text-red-500 font-bold px-2">Удалить</button>
                        </div>
                    </div>`;
            });
        });

        // 4. ЗАГРУЗКА
        document.getElementById('upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "Магия начинается...";
            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=5075a2f2bf9edb2a94bc4dd69e8e025e', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    await addDoc(collection(db, "photos"), {
                        url: data.data.url,
                        time: Date.now(),
                        author: window.userName || "Аноним"
                    });
                    document.getElementById('status').innerText = "Фото в ленте!";
                }
            } catch (err) {
                document.getElementById('status').innerText = "Ошибка сети";
            }
        });
    </script>
</body>
</html>
