<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5">
    <div class="max-w-md mx-auto text-center">
        <h1 class="text-3xl font-bold mb-2 text-amber-400 uppercase">Наша Свадьба</h1>
        <p class="text-slate-400 mb-8 text-sm">Делитесь вашими моментами!</p>

        <label class="bg-amber-500 hover:bg-amber-600 text-slate-950 px-8 py-4 rounded-full font-bold cursor-pointer inline-block mb-4 transition-all shadow-lg active:scale-95">
            ОТПРАВИТЬ ФОТО
            <input type="file" id="upload" class="hidden" accept="image/*">
        </label>

        <div id="status" class="text-xs text-slate-500 mb-8 italic bg-slate-800 p-2 rounded">Инициализация...</div>

        <div id="gallery" class="grid grid-cols-2 gap-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ТВОИ ДАННЫЕ (из последнего скрина)
        const firebaseConfig = {
            apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
            authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
            projectId: "wedding-global-gallery-b7876",
            storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
            messagingSenderId: "59194059288",
            appId: "1:59194059288:web:94c48c36daa034157de16d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const status = document.getElementById('status');

        // 1. ПОДКЛЮЧЕНИЕ К ГАЛЕРЕЕ
        try {
            const q = query(collection(db, "photos"), orderBy("time", "desc"));
            onSnapshot(q, (snapshot) => {
                status.innerText = "Связь установлена. Фото в базе: " + snapshot.size;
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                snapshot.forEach(doc => {
                    gallery.innerHTML += `
                        <div class="relative group">
                            <img src="${doc.data().url}" class="w-full aspect-square object-cover rounded-lg shadow-md border border-slate-700">
                        </div>`;
                });
            }, (err) => {
                status.innerHTML = "Ошибка доступа Firebase!<br>Проверь Authorized Domains в настройках Auth.";
                console.error(err);
            });
        } catch (e) {
            status.innerText = "Ошибка запуска: " + e.message;
        }

        // 2. ЗАГРУЗКА ФОТО
        document.getElementById('upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "Загрузка в облако ImgBB...";
            
            const formData = new FormData();
            formData.append('image', file);

            try {
                // Используем стабильный ключ ImgBB
                const res = await fetch('https://api.imgbb.com/1/upload?key=5075a2f2bf9edb2a94bc4dd69e8e025e', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    status.innerText = "Сохранение ссылки в базу...";
                    await addDoc(collection(db, "photos"), {
                        url: data.data.url,
                        time: Date.now()
                    });
                    status.innerText = "Успешно! Фото добавлено.";
                } else {
                    status.innerText = "Ошибка ImgBB: " + data.error.message;
                }
            } catch (err) {
                status.innerText = "Ошибка сети: " + err.message;
            }
        });
    </script>
</body>
</html>
