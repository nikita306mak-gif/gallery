<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
        authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
        projectId: "wedding-global-gallery-b7876",
        storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
        messagingSenderId: "591994059288",
        appId: "1:591994059288:web:e7db71815514a96b7de16d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Функция сохранения имени
    window.saveName = () => {
        const input = document.getElementById('user-name-input');
        const val = input.value.trim();
        if (val.length > 1) {
            localStorage.setItem('wedding_user', val);
            document.getElementById('name-modal').classList.add('hidden');
            load();
        } else {
            alert("Пожалуйста, введите ваше имя");
        }
    };

    const load = () => {
        const gallery = document.getElementById('gallery');
        const q = query(collection(db, "photos"), orderBy("time", "desc"));

        onSnapshot(q, (snap) => {
            gallery.innerHTML = '';
            document.getElementById('empty-msg').classList.toggle('hidden', !snap.empty);
            snap.forEach(d => {
                const data = d.data();
                gallery.innerHTML += `
                    <div class="relative bg-white p-1" onclick="openPhoto('${d.id}', '${data.url}', '${data.author}')">
                        <div class="aspect-square overflow-hidden bg-stone-100">
                            <img src="${data.url}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-[11px] text-center font-calligraphy py-1.5 text-stone-500 truncate">${data.author || "Гость"}</p>
                    </div>`;
            });
        });
    };

    // Загрузка фото
    document.getElementById('upload-input').addEventListener('change', async (e) => {
        const user = localStorage.getItem('wedding_user');
        if (!user) {
            document.getElementById('name-modal').classList.remove('hidden');
            return;
        }

        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('status-bar').style.opacity = '1';
        const fd = new FormData();
        fd.append('image', file);

        try {
            const res = await fetch('https://api.imgbb.com/1/upload?key=735b440591505ed937f6d64b1d3dc16c', { method: 'POST', body: fd });
            const d = await res.json();
            if (d.success) {
                await addDoc(collection(db, "photos"), {
                    url: d.data.url,
                    time: Date.now(),
                    author: user
                });
            }
        } catch (err) {
            alert("Ошибка загрузки. Попробуйте еще раз.");
        }
        document.getElementById('status-bar').style.opacity = '0';
        e.target.value = '';
    });

    // Проверка пользователя при старте
    const user = localStorage.getItem('wedding_user');
    if (!user) {
        // Если имени нет, ПРИНУДИТЕЛЬНО показываем окно
        setTimeout(() => {
            document.getElementById('name-modal').classList.remove('hidden');
        }, 500); 
    } else {
        load();
    }

    // Вспомогательные функции
    window.openPhoto = (id, url, auth) => {
        document.getElementById('full-photo').src = url;
        document.getElementById('viewer-name').innerText = auth;
        document.getElementById('photo-viewer').classList.remove('hidden');
    };
    window.closePhoto = () => document.getElementById('photo-viewer').classList.add('hidden');
</script>
