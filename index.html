<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gallery App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nikita Gallery">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --accent-color: #ffffff;
            --text-secondary: #888888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: env(safe-area-inset-top) 15px 20px 15px; /* Учитываем челку iPhone */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Обновленный заголовок с именем профиля */
        .profile-header {
            text-align: center;
            margin: 40px 0 30px 0;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            text-transform: lowercase; /* Стиль под соцсети */
        }

        .profile-status {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Сетка как в Instagram */
            gap: 2px;
            width: 100%;
            max-width: 500px;
        }

        .gif-card {
            background-color: var(--card-bg);
            aspect-ratio: 1 / 1;
            overflow: hidden;
            position: relative;
        }

        .gif-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #install-btn {
            display: none;
            margin: 10px 0 20px 0;
            padding: 8px 16px;
            background: var(--accent-color);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="profile-header">
        <p class="profile-name" id="user-name">nikita306mak</p>
        <p class="profile-status">Галерея GIF</p>
    </div>
    
    <button id="install-btn">Установить приложение</button>

    <div class="gallery" id="gallery">
        <div class="gif-card">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxxXG9TJCDe/giphy.gif" alt="GIF">
        </div>
        <div class="gif-card">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0HlUxu9fMQx0kX3G/giphy.gif" alt="GIF">
        </div>
        <div class="gif-card">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKVUn7iM8FMEU24/giphy.gif" alt="GIF">
        </div>
    </div>

    <script>
        // Автоматическое определение имени из URL GitHub Pages
        const path = window.location.hostname;
        if (path.includes('github.io')) {
            const username = path.split('.')[0];
            document.getElementById('user-name').textContent = username;
        }

        // PWA Регистрация
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        // Кнопка установки
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-btn').style.display = 'none';
            }
        });
    </script>
</body>
</html>
