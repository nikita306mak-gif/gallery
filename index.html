<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Live Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-btn { display: none !important; }
        body.is-admin .admin-btn { display: flex !important; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; }
        .zoom-in { animation: zoom-in 0.3s ease-out; }
        @keyframes zoom-in {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-stone-100 text-stone-900 h-screen flex flex-col font-sans">

    <header class="bg-white border-b border-stone-200 px-4 py-4 sticky top-0 z-40 shadow-sm">
        <div class="flex items-center justify-center relative">
            <h1 class="text-xl font-extrabold text-emerald-900 tracking-tight uppercase" onclick="tryAdmin()">
                Никита + Анастасия
            </h1>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto p-3">
        <div id="status" class="text-[10px] text-stone-400 mb-4 tracking-[3px] opacity-0 text-center uppercase font-medium">Загрузка...</div>

        <div id="gallery" class="grid grid-cols-2 gap-2 bg-white p-2 rounded-2xl shadow-inner border border-stone-200">
            </div>
    </main>

    <footer class="bg-white border-t border-stone-200 p-4 pb-8 z-40 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto grid grid-cols-2 gap-4">
            
            <label class="bg-emerald-600 hover:bg-emerald-700 text-white p-4 rounded-xl font-bold cursor-pointer inline-flex items-center gap-2.5 transition-all shadow-md active:scale-95 uppercase text-xs w-full justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                Камера
                <input type="file" id="upload-camera" class="hidden" accept="image/*" capture="camera">
            </label>

            <label class="bg-stone-100 hover:bg-stone-200 text-stone-800 p-4 rounded-xl font-bold cursor-pointer inline-flex items-center gap-2 transition-all active:scale-95 text-xs w-full justify-center border border-stone-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-stone-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                Галерея
                <input type="file" id="upload-gallery" class="hidden" accept="image/*">
            </label>

        </div>
    </footer>

    <div id="photo-viewer" class="fixed inset-0 bg-stone-900/98 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md" onclick="closePhoto()">
        <button class="absolute top-6 right-6 text-stone-400 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
        <img id="full-photo" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl zoom-in" onclick="event.stopPropagation()">
    </div>

    <div id="name-modal" class="fixed inset-0 bg-stone-950/95 flex items-center justify-center z-50 hidden p-6 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl w-full max-w-xs text-center border border-stone-200 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-emerald-950 uppercase tracking-tight">Добро пожаловать!</h2>
            <input type="text" id="user-name-input" class="w-full p-4 rounded-xl bg-stone-50 border border-stone-200 text-stone-900 mb-4 outline-none focus:border-emerald-500 text-center text-lg" placeholder="Ваше имя...">
            <button onclick="saveName()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hover:bg-emerald-700 transition-all shadow-md active:scale-95 uppercase text-sm">Начать</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
            authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
            projectId: "wedding-global-gallery-b7876",
            storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
            messagingSenderId: "59194059288",
            appId: "1:59194059288:web:94c48c36daa034157de16d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.openPhoto = (url) => {
            const viewer = document.getElementById('photo-viewer');
            document.getElementById('full-photo').src = url;
            viewer.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closePhoto = () => {
            document.getElementById('photo-viewer').classList.add('hidden');
            document.body.style.overflow = 'auto';
        };

        window.userName = localStorage.getItem('wedding_user_name');
        if (!window.userName) document.getElementById('name-modal').classList.remove('hidden');

        window.saveName = () => {
            const val = document.getElementById('user-name-input').value.trim();
            if (val.length > 1) {
                localStorage.setItem('wedding_user_name', val);
                location.reload();
            }
        };

        window.tryAdmin = () => {
            const admins = ["Макар", "Никита", "Анастасия", "Admin"];
            if (admins.includes(localStorage.getItem('wedding_user_name'))) {
                if (prompt("Пароль:") === "1234") document.body.classList.toggle('is-admin');
            }
        };

        window.removePhoto = async (id, event) => {
            event.stopPropagation();
            if (confirm("Удалить это фото?")) await deleteDoc(doc(window.db, "photos", id));
        };

        const q = query(collection(db, "photos"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                gallery.innerHTML += `
                    <div class="relative bg-stone-50 aspect-square overflow-hidden rounded-lg" onclick="openPhoto('${data.url}')">
                        <img src="${data.url}" class="w-full h-full object-cover">
                        <div class="absolute bottom-1 right-1 px-1.5 py-0.5 bg-white/80 rounded backdrop-blur-sm">
                            <span class="text-stone-900 text-[9px] font-bold uppercase">${data.author || 'Гость'}</span>
                        </div>
                        <button onclick="removePhoto('${doc.id}', event)" class="admin-btn absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>`;
            });
        });

        const handleUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('status');
            status.style.opacity = '1';
            const formData = new FormData();
            formData.append('image', file);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=5075a2f2bf9edb2a94bc4dd69e8e025e', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    await addDoc(collection(db, "photos"), { url: data.data.url, time: Date.now(), author: localStorage.getItem('wedding_user_name') || "Гость" });
                    status.style.opacity = '0';
                }
            } catch (err) { status.innerText = "Ошибка сети"; }
        };

        document.getElementById('upload-camera').addEventListener('change', handleUpload);
        document.getElementById('upload-gallery').addEventListener('change', handleUpload);
    </script>
</body>
</html>
