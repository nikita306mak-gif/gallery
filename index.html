<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-btn { display: none !important; }
        body.is-admin .admin-btn { display: block !important; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-white text-stone-800 h-screen flex flex-col font-sans">

    <header class="bg-white border-b border-stone-200 px-6 py-4 sticky top-0 z-40 flex items-center justify-between">
        <h1 class="text-xl font-bold tracking-tight text-stone-800 cursor-pointer" onclick="tryAdmin()">Никита + Анастасия</h1>
        <div id="online-indicator" class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
    </header>

    <main class="flex-grow overflow-y-auto">
        <div id="status" class="text-[10px] text-stone-400 py-2 tracking-[3px] opacity-0 text-center uppercase font-bold transition-opacity">Загрузка...</div>
        <div id="gallery" class="grid grid-cols-3 gap-1 px-1">
            </div>
    </main>

    <footer class="bg-white border-t border-stone-100 p-4 pb-8 z-40 flex justify-center gap-6 shadow-lg">
        <label class="flex flex-col items-center gap-1 cursor-pointer p-2 text-stone-500 hover:text-stone-900 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            <span class="text-[10px] font-bold uppercase tracking-wider">Альбом</span>
            <input type="file" id="upload-gallery" class="hidden" accept="image/*">
        </label>

        <label class="bg-stone-900 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            <input type="file" id="upload-camera" class="hidden" accept="image/*" capture="environment">
        </label>
    </footer>

    <div id="photo-viewer" class="fixed inset-0 bg-white z-50 hidden flex flex-col" onclick="closePhoto()">
        <div class="p-4 flex justify-end">
            <button id="admin-delete-btn" class="admin-btn bg-red-500 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase" onclick="event.stopPropagation()">Удалить</button>
        </div>
        <div class="flex-grow flex items-center justify-center p-4">
            <img id="full-photo" src="" class="max-w-full max-h-full shadow-2xl rounded-lg" onclick="event.stopPropagation()">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
            authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
            projectId: "wedding-global-gallery-b7876",
            storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
            messagingSenderId: "59194059288",
            appId: "1:59194059288:web:e7db71815514a96b7de16d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Загрузка фото в ленту
        const q = query(collection(db, "photos"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                gallery.innerHTML += `
                    <div class="relative aspect-square overflow-hidden bg-stone-100 rounded-sm" onclick="openPhoto('${docSnap.id}', '${data.url}')">
                        <img src="${data.url}" class="w-full h-full object-cover">
                        <button onclick="event.stopPropagation(); removePhoto('${docSnap.id}')" class="admin-btn absolute top-1 right-1 bg-red-500 text-white px-2 py-1 rounded text-[10px] font-bold">X</button>
                    </div>`;
            });
        });

        // Открытие фото
        window.openPhoto = (id, url) => {
            document.getElementById('full-photo').src = url;
            document.getElementById('photo-viewer').classList.remove('hidden');
            document.getElementById('admin-delete-btn').onclick = () => removePhoto(id);
        };

        window.closePhoto = () => document.getElementById('photo-viewer').classList.add('hidden');

        // Удаление (только для админа)
        window.removePhoto = async (id) => {
            if (confirm("Удалить это фото?")) {
                await deleteDoc(doc(db, "photos", id));
                closePhoto();
            }
        };

        // Админ-режим (нажать на заголовок и ввести 1234)
        window.tryAdmin = () => {
            if (prompt("Пароль администратора:") === "1234") {
                document.body.classList.toggle('is-admin');
            }
        };

        // Логика загрузки
        const handleUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            status.style.opacity = '1';

            const formData = new FormData();
            formData.append('image', file);

            try {
                // Твой личный ключ ImgBB
                const res = await fetch('https://api.imgbb.com/1/upload?key=735b440591505ed937f6d64b1d3dc16c', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    await addDoc(collection(db, "photos"), {
                        url: data.data.url,
                        time: Date.now()
                    });
                }
            } catch (err) {
                alert("Ошибка загрузки");
            }
            status.style.opacity = '0';
        };

        document.getElementById('upload-camera').addEventListener('change', handleUpload);
        document.getElementById('upload-gallery').addEventListener('change', handleUpload);
    </script>
</body>
</html>
