<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Gram</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WeddingGram">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1077/1077035.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-btn { display: none !important; }
        body.is-admin .admin-btn { display: flex !important; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .active-tab { color: #1c1917 !important; font-weight: 800; border-top: 2px solid #1c1917; }
        .gallery-item { aspect-ratio: 1 / 1; }
    </style>
</head>
<body class="bg-white text-stone-900 h-screen flex flex-col font-sans">

    <header class="bg-white border-b border-stone-200 px-4 py-3 sticky top-0 z-40 flex items-center justify-between">
        <div class="w-12 text-[10px] font-black text-stone-400 uppercase tracking-tighter" id="filter-status">Лента</div>
        <h1 class="text-xl font-bold tracking-tight text-stone-800 cursor-pointer" onclick="tryAdmin()">Никита + Анастасия</h1>
        <div class="w-12 flex justify-end">
            <div id="online-indicator" class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto bg-stone-50">
        <div id="status-bar" class="text-[10px] text-stone-500 py-2 tracking-[3px] opacity-0 text-center uppercase font-bold transition-opacity bg-white border-b border-stone-100">Загрузка...</div>
        <div id="gallery" class="grid grid-cols-3 gap-0.5">
            </div>
        <div id="empty-msg" class="hidden flex flex-col items-center justify-center p-20 text-stone-400 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            <p class="text-xs uppercase tracking-widest">Здесь пока пусто</p>
        </div>
    </main>

    <footer class="bg-white border-t border-stone-200 px-2 pb-8 pt-2 z-40 flex justify-around items-center shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
        
        <button id="nav-profile" onclick="setFilter(true)" class="flex flex-col items-center gap-1 p-2 text-stone-400 transition-all w-16">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            <span class="text-[9px] font-bold uppercase">Мои</span>
        </button>

        <label class="flex flex-col items-center gap-1 cursor-pointer p-2 text-stone-600 w-16">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            <span class="text-[9px] font-bold uppercase">Альбом</span>
            <input type="file" id="upload-gallery" class="hidden" accept="image/*">
        </label>

        <label class="bg-stone-900 text-white p-4 rounded-2xl shadow-xl active:scale-90 transition-transform cursor-pointer -mt-8 border-4 border-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
            <input type="file" id="upload-camera" class="hidden" accept="image/*" capture="environment">
        </label>

        <button id="nav-all" onclick="setFilter(false)" class="flex flex-col items-center gap-1 p-2 text-stone-400 active-tab transition-all w-16">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            <span class="text-[9px] font-bold uppercase">Лента</span>
        </button>
    </footer>

    <div id="photo-viewer" class="fixed inset-0 bg-black z-[100] hidden flex flex-col animate-in fade-in duration-200" onclick="closePhoto()">
        <header class="p-4 flex items-center justify-between bg-black/50 backdrop-blur-md">
             <div class="flex items-center gap-3">
                 <div class="w-9 h-9 rounded-full bg-stone-800 flex items-center
