
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Галерея</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .photo-card:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <header class="bg-white border-b sticky top-0 z-10 p-4 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">ФОТО-ПОТОК</h1>
            <label class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-bold cursor-pointer transition-all active:scale-95 shadow-md">
                Добавить фото
                <input type="file" id="fileInput" class="hidden" accept="image/*">
            </label>
        </div>
    </header>

    <div id="status" class="hidden fixed top-24 left-1/2 -translate-x-1/2 bg-white shadow-2xl border rounded-full px-6 py-3 z-20">
        <div class="flex items-center gap-3">
            <div class="loader w-5 h-5 border-2 border-blue-100 rounded-full"></div>
            <span class="text-sm font-semibold text-slate-700">Загружаем в облако...</span>
        </div>
    </div>

    <main class="max-w-2xl mx-auto p-4">
        <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    </main>

    <script>
        // Твой ключ (я его сохранил из прошлого шага)
        const API_KEY = '5075a2f2bf9edb2a94bc4dd69e8e025e'; 

        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');
        const status = document.getElementById('status');

        let photos = JSON.parse(localStorage.getItem('my_saved_photos') || '[]');

        function renderGallery() {
            if (photos.length === 0) {
                gallery.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">Тут пока пусто.</div>';
                return;
            }
            gallery.innerHTML = photos.map((url, index) => `
                <div class="photo-card relative aspect-square rounded-xl overflow-hidden shadow-sm bg-white border border-slate-200 group">
                    <img src="${url}" class="w-full h-full object-cover cursor-pointer" onclick="window.open('${url}', '_blank')">
                    
                    <button onclick="deletePhoto(${index})" class="delete-btn opacity-0 absolute top-2 right-2 bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center transition-opacity shadow-lg">
                        ✕
                    </button>
                </div>
            `).join('');
        }

        // Функция удаления
        window.deletePhoto = function(index) {
            if (confirm('Удалить это фото из твоей галереи?')) {
                photos.splice(index, 1); // Удаляем 1 элемент по индексу
                localStorage.setItem('my_saved_photos', JSON.stringify(photos)); // Обновляем память
                renderGallery(); // Перерисовываем экран
            }
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.classList.remove('hidden');
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    photos.unshift(result.data.url);
                    localStorage.setItem('my_saved_photos', JSON.stringify(photos));
                    renderGallery();
                }
            } catch (err) {
                alert('Ошибка загрузки');
            } finally {
                status.classList.add('hidden');
                fileInput.value = '';
            }
        });

        renderGallery();
    </script>
</body>
</html>
