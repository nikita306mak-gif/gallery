<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Live Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Стиль кнопок удаления (как в Diptic - скрыты по умолчанию) */
        .admin-btn { display: none !important; }
        body.is-admin .admin-btn { display: flex !important; }
        
        /* Скрытие полосы прокрутки */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Стили для имитации приложения */
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-stone-100 text-stone-900 h-screen flex flex-col font-sans">

    <header class="bg-stone-50 border-b border-stone-200 px-4 py-3 sticky top-0 z-40">
        <div class="flex items-center justify-center relative">
            <h1 class="text-lg font-bold text-emerald-950 tracking-tight" onclick="tryAdmin()">Никита и Невеста</h1>
            </div>
    </header>

    <main class="flex-grow overflow-y-auto p-3">
        
        <div id="status" class="text-[10px] text-stone-400 mb-6 tracking-[3px] opacity-0 text-center uppercase font-medium">Связь</div>

        <div id="gallery" class="grid grid-cols-2 gap-1.5 md:gap-3 bg-white p-1.5 rounded-xl shadow-inner border border-stone-200">
            </div>
        
    </main>

    <footer class="bg-stone-50 border-t border-stone-200 p-4 pb-8 z-40 shadow-lg">
        <div class="max-w-md mx-auto grid grid-cols-2 gap-4">
            
            <label class="bg-emerald-600 hover:bg-emerald-700 text-white p-4 rounded-xl font-bold cursor-pointer inline-flex items-center gap-2.5 transition-all shadow active:scale-95 uppercase text-xs w-full justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                Сделать фото
                <input type="file" id="upload-camera" class="hidden" accept="image/*" capture="camera">
            </label>

            <label class="bg-stone-100 hover:bg-stone-200 text-stone-900 p-4 rounded-xl font-medium cursor-pointer inline-flex items-center gap-2 transition-all active:scale-95 text-xs w-full justify-center border border-stone-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-stone-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                Из галереи
                <input type="file" id="upload-gallery" class="hidden" accept="image/*">
            </label>

        </div>
    </footer>

    <div id="photo-viewer" class="fixed inset-0 bg-stone-950/95 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm" onclick="closePhoto()">
        <button class="absolute top-6 right-6 text-stone-500 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
        <img id="full-photo" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl transition-all duration-300 scale-90" onclick="event.stopPropagation()">
    </div>

    <div id="name-modal" class="fixed inset-0 bg-stone-950/95 flex items-center justify-center z-50 hidden p-6 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl w-full max-w-xs text-center border border-stone-200 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-emerald-950 uppercase text-center font-sans">Как вас зовут?</h2>
            <input type="text" id="user-name-input" class="w-full p-4 rounded-xl bg-stone-100 border border-stone-200 text-stone-900 mb-4 outline-none focus:border-emerald-500 text-center text-lg shadow-inner" placeholder="Ваше имя...">
            <button onclick="saveName()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl hover:bg-emerald-700 transition-all shadow-lg active:scale-95 uppercase">Войти</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ТВОЙ КОНФИГ
        const firebaseConfig = {
            apiKey: "AIzaSyBbnhk5_ueRGpVizQ7z0PC82UONcOWNCWc",
            authDomain: "wedding-global-gallery-b7876.firebaseapp.com",
            projectId: "wedding-global-gallery-b7876",
            storageBucket: "wedding-global-gallery-b7876.firebasestorage.app",
            messagingSenderId: "59194059288",
            appId: "1:59194059288:web:94c48c36daa034157de16d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        // Просмотр фото
        window.openPhoto = (url) => {
            const viewer = document.getElementById('photo-viewer');
            const fullPhoto = document.getElementById('full-photo');
            fullPhoto.src = url;
            viewer.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            setTimeout(() => fullPhoto.classList.remove('scale-90'), 10);
        };

        window.closePhoto = () => {
            const viewer = document.getElementById('photo-viewer');
            const fullPhoto = document.getElementById('full-photo');
            fullPhoto.classList.add('scale-90');
            setTimeout(() => {
                viewer.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }, 300);
        };

        // Имя
        window.userName = localStorage.getItem('wedding_user_name');
        if (!window.userName) {
            document.getElementById('name-modal').classList.remove('hidden');
        }

        window.saveName = () => {
            const val = document.getElementById('user-name-input').value.trim();
            if (val.length > 1) {
                localStorage.setItem('wedding_user_name', val);
                document.getElementById('name-modal').classList.add('hidden');
                location.reload();
            }
        };

        // Админка
        window.tryAdmin = () => {
            const allowedAdmins = ["Макар", "Никита", "Admin"]; 
            if (allowedAdmins.includes(localStorage.getItem('wedding_user_name'))) {
                if (prompt("Пароль:") === "1234") {
                    document.body.classList.toggle('is-admin');
                }
            }
        };

        window.removePhoto = async (id, event) => {
            event.stopPropagation();
            if (confirm("Удалить фото?")) {
                await deleteDoc(doc(window.db, "photos", id));
            }
        };

        // Галерея (стиль Diptic с отступами)
        const q = query(collection(db, "photos"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                gallery.innerHTML += `
                    <div class="relative bg-white aspect-square overflow-hidden group" onclick="openPhoto('${data.url}')">
                        <img src="${data.url}" class="w-full h-full object-cover cursor-pointer hover:scale-105 transition-transform duration-500">
                        <div class="absolute bottom-1 right-1 px-1.5 py-0.5 bg-white/70 rounded click-through backdrop-blur-[2px]">
                            <span class="text-stone-900 text-[9px] font-bold truncate tracking-tight uppercase">${data.author || 'Гость'}</span>
                        </div>
                        <button onclick="removePhoto('${doc.id}', event)" class="admin-btn absolute top-1.5 right-1.5 bg-red-600/80 text-white p-1.5 rounded-full shadow-lg z-20 active:scale-75">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>`;
            });
        });

        // Загрузка
        const handleUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('status');
            status.innerText = "Идет загрузка";
            status.style.opacity = '1';
            
            const formData = new FormData();
            formData.append('image', file);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=5075a2f2bf9edb2a94bc4dd69e8e025e', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    await addDoc(collection(db, "photos"), { url: data.data.url, time: Date.now(), author: localStorage.getItem('wedding_user_name') || "Аноним" });
                    status.innerText = "Связь";
                    status.style.opacity = '0';
                }
            } catch (err) { status.innerText = "Ошибка"; }
        };

        document.getElementById('upload-camera').addEventListener('change', handleUpload);
        document.getElementById('upload-gallery').addEventListener('change', handleUpload);
    </script>
</body>
</html>
